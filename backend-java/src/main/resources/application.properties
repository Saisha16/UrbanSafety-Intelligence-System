
# Server Configuration
server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always

# Application Configuration
spring.application.name=safeguard-ai-backend
spring.profiles.include=resilience

# Logging Configuration
logging.level.root=INFO
logging.level.com.safeguard=DEBUG
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Spring Validation
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

# Cache Configuration (Redis - optional, will use in-memory if Redis unavailable)
spring.cache.type=simple
spring.cache.cache-names=heatmap,locations,trends
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=5m

# Circuit Breaker Configuration (loaded from application-resilience.yml)
management.endpoints.web.exposure.include=health,info,metrics,circuitbreakers
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true

# API Documentation
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# JWT Configuration
jwt.secret=SafeGuardAI2024SecretKeyForJWTTokenGenerationAndValidation
jwt.expiration=3600000

# External Feed Ingestion
# Use X-Ingestion-Key header for /api/incidents/ingest
# Change this value for non-local environments.
ingestion.api-key=dev-ingestion-key

# Database Configuration (PostgreSQL - for future migration)
spring.datasource.url=jdbc:h2:file:./backend-java/data/safeguarddb;AUTO_SERVER=TRUE;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Redis Configuration (for distributed caching - optional)
# spring.redis.host=localhost
# spring.redis.port=6379
# spring.redis.timeout=2000ms

